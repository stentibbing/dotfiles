# theme
set -g @rose_pine_variant 'main'

color_base="#191724"
color_surface="#1f1d2e"
color_overlay="#26233a"
color_muted="#6e6a86"
color_subtle="#908caa"
color_text="#e0def4"
color_love="#eb6f92"
color_gold="#f6c177"
color_rose="#ebbcba"
color_pine="#31748f"
color_foam="#9ccfd8"
color_iris="#c4a7e7"

# Prefer vi style key table
setw -g mode-keys vi
setw -g mode-keys vi

# use system clipboard
set-option -g set-clipboard external
bind-key -T copy-mode-vi 'v' send -X begin-selection    

# prevent server exit without sessions
set -s exit-empty off

# start counting windows and panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Time betweeb leader combo and input key
set-option -sg escape-time 10

set-option -g focus-events on

# Make Nvim happy
set-option -g default-terminal "screen-256color"
set-option -sa terminal-features ',xterm-256color:RGB'

# disable automatic renaming
setw -g allow-rename off
setw -g automatic-rename off

# history
set -g history-limit 20000
set -g buffer-limit 20

# set parent terminal title to reflect current window in tmux session 
set -g set-titles on
set -g set-titles-string "#I-#W"

# enable mouse support
set -g mouse on

# prompt to rename window right after it's created
set-hook -g after-new-window 'command-prompt -I "#{window_name}" "rename-window '%%'"'

# new window in the same path
bind c new-window -c "#{pane_current_path}"

# kill window and pane without prompt
unbind x
bind x kill-pane
bind & kill-window

# rename session and window
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# create new session
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
bind K kill-session

# reload tmux configuration 
bind C-r source-file ~/.tmux.conf \; display "Config reloaded"

# general status bar settings
set -g status on 
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

# colors for tmux-plugin-sysstat "MEM" and "CPU" widget
set -g @sysstat_cpu_color_low "$color_foam"
set -g @sysstat_cpu_color_medium "$color_gold"
set -g @sysstat_cpu_color_stress "$color_love"

set -g @sysstat_mem_color_low "$color_foam"
set -g @sysstat_mem_color_medium "$color_gold"
set -g @sysstat_mem_color_stress "$color_love"

# configure view templates for tmux-plugin-sysstat "MEM" and "CPU" widget
set -g @sysstat_mem_view_tmpl "#[fg=#{mem.color}]#{mem.pused} (#{mem.used})"
set -g @sysstat_cpu_view_tmpl "#[fg=#{cpu.color}]#{cpu.pused}"

# templates for statusbar widgets
sysstat_cpu="#[fg=$color_rose]󰻠 CPU #{sysstat_cpu}#[fg=$color_dark_gray]"
sysstat_mem="#[fg=$color_rose]󰍛 MEM #{sysstat_mem}#[fg=$color_dark_gray bg=reset]" 
separator="#[fg=$color_pine]|"


# rose-pine settings
set -g @rose_pine_host 'on' 
set -g @rose_pine_date_time ''
set -g @rose_pine_user 'on'
set -g @rose_pine_directory 'on' 
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_default_window_behavior 'on'
set -g @rose_pine_show_current_program 'on'  
set -g @rose_pine_show_pane_directory 'on'  

set -g @rose_pine_left_separator ' > ' 
set -g @rose_pine_right_separator ' < '
set -g @rose_pine_field_separator ' | ' 
set -g @rose_pine_window_separator ' - '

set -g @rose_pine_session_icon '' 
set -g @rose_pine_current_window_icon '' 
set -g @rose_pine_folder_icon '' 
set -g @rose_pine_username_icon '' 
set -g @rose_pine_hostname_icon '󰒋'
set -g @rose_pine_date_time_icon '󰃰' 
set -g @rose_pine_window_status_separator " | "

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @rose_pine_status_right_prepend_section "$sysstat_cpu $separator $sysstat_mem $separator "

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# To install TMUX plugin manager:  
# - git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# - in tmux, prefix + I to install plugins
run '~/.tmux/plugins/tpm/tpm'
